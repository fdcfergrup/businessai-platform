version: '3.8'

services:
  businessai:
    build: .
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - SERVE_STATIC=true
      - JWT_SECRET=businessai-super-secret-jwt-key-2024
      - MONGODB_URI=
    volumes:
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:5000/api/health', (res) => { process.exit(res.statusCode === 200 ? 0 : 1) })"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  uploads: